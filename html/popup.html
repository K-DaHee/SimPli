<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>SimPli 메인 팝업</title>
    <!-- Pretendard 폰트 -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css" />
    <!-- 구글 머티리얼 아이콘 팩 -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="../css/popup.css">
</head>

<body>
    <div class="glass-container">

        <!-- 앱 헤더 및 로고 -->
        <header class="header">
            <div class="logo-container">
                <span class="material-icons-round logo-icon">queue_music</span>
                <h1>SimPli</h1>
            </div>
        </header>

        <!-- 메인 컨텐츠 영역 -->
        <main class="content">

            <!-- 메인 화면 (폴더 목록) -->
            <section id="view-folder-list" class="view active">
                <div class="folder-header">
                    <h2>내 플레이리스트</h2>
                    <button class="action-btn" id="btn-add-folder" title="새 폴더 창 열기">
                        <span class="material-icons-round">create_new_folder</span>
                    </button>
                </div>

                <!-- 커스텀 폴더 이름 입력창 -->
                <div class="add-folder-container" id="add-folder-container" style="display: none;">
                    <div class="input-group-folder">
                        <input type="text" id="input-folder-name" placeholder="새 플레이리스트 이름" autocomplete="off">
                    </div>
                    <button id="btn-submit-folder" class="submit-btn" title="폴더 생성">
                        <span class="material-icons-round">check</span>
                    </button>
                    <button id="btn-cancel-folder" class="cancel-btn" title="취소">
                        <span class="material-icons-round">close</span>
                    </button>
                </div>

                <ul class="folder-list" id="folder-list">
                    <!-- JS로 동적 렌더링 -->
                </ul>
            </section>

            <!-- 특정 폴더 진입 화면 -->
            <section id="view-playlist-detail" class="view">
                <div class="folder-header">
                    <button class="action-btn" id="btn-back" title="뒤로 가기">
                        <span class="material-icons-round">arrow_back_ios_new</span>
                    </button>
                    <h2 class="current-folder-name">폴더명</h2>
                    <button class="action-btn" id="btn-folder-options">
                        <span class="material-icons-round">more_vert</span>
                    </button>
                </div>

                <!-- 가수/제목 직접 입력 추가 폼 -->
                <div class="add-song-container">
                    <div class="input-group">
                        <input type="text" id="input-artist" placeholder="가수명 입력" autocomplete="off">
                        <input type="text" id="input-title" placeholder="노래 제목 입력" autocomplete="off">
                    </div>
                    <button id="btn-add-song" title="음악 자동 연결하여 리스트에 추가">
                        <span class="material-icons-round">add</span>
                    </button>
                </div>

                <!-- 플레이리스트 -->
                <ul class="song-list" id="song-list">
                    <!-- JS로 동적 렌더링 -->
                </ul>
            </section>

        </main>

        <!-- 하단 고정 오디오 플레이어 컨트롤 -->
        <footer class="player" id="player-container">
            <div class="player-info">
                <p class="track-title">선택된 곡 없음</p>
            </div>
            <div class="player-controls">
                <button class="ctrl-btn"><span class="material-icons-round">skip_previous</span></button>
                <button class="ctrl-btn play-pause"><span class="material-icons-round">play_arrow</span></button>
                <button class="ctrl-btn"><span class="material-icons-round">skip_next</span></button>
            </div>
        </footer>

    </div>

    <!-- UI 이벤트 컨트롤러 -->
    <script src="../js/storage.js"></script>
    <script src="../js/popup.js"></script>
</body>

</html>
