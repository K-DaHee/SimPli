<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SimPli Mini Player</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: #121212;
            color: white;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        .header {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ff4b2b;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #player-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }

        .info {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        #song-title {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        #song-artist {
            font-size: 12px;
            color: #aaa;
        }

        .status {
            margin-top: auto;
            font-size: 10px;
            color: #555;
            text-align: center;
            padding: 10px 0;
        }
    </style>
</head>

<body>
    <div class="header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" />
        </svg>
        SimPli Mini Player
    </div>

    <div id="player-container">
        <!-- 유튜브 플레이어가 여기에 들어갑니다 -->
    </div>

    <div class="info" id="current-info" style="display:none;">
        <div id="song-title">곡 제목</div>
        <div id="song-artist">아티스트</div>
    </div>

    <div class="status">
        사이드 패널이 열려있는 동안 백그라운드 재생이 유지됩니다.
    </div>

    <script src="../js/sidepanel.js"></script>
</body>

</html>
