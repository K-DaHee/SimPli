name: Auto Release on Tag

# 워크플로우 실행 조건
on:
  workflow_dispatch:
  push:
    # v 태그 푸시 시 실행 (예: v1.0.0)
    tags:
      - 'v*'

# 릴리즈 생성 권한
permissions:
  contents: write

jobs:
  auto_release:
    runs-on: ubuntu-latest

    steps:
      # 저장소 코드 체크아웃
      - name: Checkout 코드
        uses: actions/checkout@v4
        with:
          # 전체 커밋 내역(태그 포함) 로드
          fetch-depth: 0 

      # 버전 번호 추출
      - name: 추출 버전 정보
        id: extract_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # manifest.json 버전 갱신
      - name: manifest.json 버전 업데이트
        run: |
          # 콤마 보존을 위해 [^"]* 정규식 사용
          sed -i 's/"version": "[^"]*"/"version": "${{ steps.extract_version.outputs.version }}"/' manifest.json

      # 릴리즈 에셋용 압축
      - name: 릴리즈 압축 파일 생성
        run: |
          # 불필요 파일 제외 후 zip 압축
          zip -r v${{ steps.extract_version.outputs.version }}.zip . -x "*.git*" -x "*.github*" -x "posts/*"

      # 릴리즈 노트 내역 산출
      - name: 릴리즈 노트 생성
        id: generate_release_notes
        run: |
          # 직전 태그 조회
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # 직전 태그 유무에 따른 커밋 로그 추출
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" ${{ github.ref }})
          else
            COMMITS=$(git log --pretty=format:"- %s" $PREVIOUS_TAG..${{ github.ref }})
          fi
          
          # 릴리즈 노트 변수 저장
          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "Release of version v${{ steps.extract_version.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "Changes in this Release:" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # GitHub 릴리즈 퍼블리싱
      - name: 릴리즈 생성
        uses: softprops/action-gh-release@v2
        with:
          files: v${{ steps.extract_version.outputs.version }}.zip
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.generate_release_notes.outputs.RELEASE_NOTES }}
